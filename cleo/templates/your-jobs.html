{% extends "base.html" %}
{% block content %}
                <main>
                    <div class="container-fluid px-4">
                        <h1 class="mt-4">Your Jobs</h1>
                        <p>List of jobs</p>
                        <div class="card mb-4">
                            <div class="card-header">
                                <i class="fas fa-table me-1"></i>
                                DataTable Example
                            </div>
                            <div class="card-body">
                                <table id="datatablesSimple">
                                    <thead>
                                        <tr>
                                            <th>ID</th>
                                            <th>Title</th>
                                            <th>Description</th>
                                            <th>Is Urgent</th>
                                            <th>Due Date</th>
                                            <th>Actions</th>
                                        </tr>
                                    </thead>
                                    <tbody>
                                        {% for job in jobs %}
                                        <tr>
                                            <td>{{ loop.index }}</td>
                                            <td><a href="/your-jobs/{{ job.url }}">{{ job.title }} </a></td>
                                            <td>{{ job.description }}</td>
                                            <td>{{ job.is_urgent }}</td>
                                            <td>{{ job.due_date }}</td>
                                            <td><a href="{{ url_for('edit_job', job_id=job.id) }}">Edit</a> <a href="{{ url_for('delete_job', job_id=job.id) }}">Delete</a></td>
                                        </tr>
                                        {% endfor %}
                                    </tr>
                                </tbody>
                            </table>
                        </div>
                    </div>
                </main>
{% endblock %}
